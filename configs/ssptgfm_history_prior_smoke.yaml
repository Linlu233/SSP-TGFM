device: cuda
require_cuda: true
output_dir: results/history_prior_smoke
seeds: [1]
few_shot_ratios: [1.0]
baselines: []
strict_full_formula: true

data:
  name: synthetic
  num_nodes: 96
  num_relations: 4
  num_edges: 480
  num_topics: 8
  seed: 1

split:
  mode: time
  val_ratio: 0.15
  test_ratio: 0.15

text:
  backend: hashing
  dim: 128
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 64
  time_dim: 16
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 8
  adapter_rank: 8
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
  use_history_prior: true
  history_prior_dim: 12
  history_prior_hidden_dim: 16
  history_prior_init_scale: 0.05

train:
  epochs: 1
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 2
  num_neg_eval: 5
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.001
  lambda_kl: 0.0001
  lambda_meta: 0.001
  meta_lr: 0.01
  meta_support_size: 4
  meta_query_size: 4
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 1
  early_stop_metric: val_composite
  early_stop_weights: {val_auc: 0.4, val_ap: 0.3, val_mrr: 0.2, val_hits@10: 0.1}
  val_rank_edges: 8
  grad_clip: 1.0
  progress_every_batches: 1
  progress_every_seconds: 0

eval:
  filtered_rank_edges: 8

ablation:
  enabled: false
