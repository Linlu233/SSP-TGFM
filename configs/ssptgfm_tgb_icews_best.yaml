device: cuda
require_cuda: true
output_dir: results/ssptgfm_tgb_icews_best
seeds:
- 1
- 2
- 3
- 4
- 5
few_shot_ratios:
- 1.0
baselines:
- lm_mlp
- structure_mlp
data:
  name: tkgl-icews
  format: tgb
  root: /root/autodl-tmp/data/data/raw/tgb
  download: true
split:
  mode: labels
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 128
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 16
  adapter_rank: 16
  temporal_layers: 2
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
  history_chunk_size: 16384
  gradient_checkpoint: true
train:
  epochs: 20
  batch_size: 2048
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 2
  num_neg_eval: 10
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 1.0e-05
  lambda_kl: 1.0e-06
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 16
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 5
  early_stop_metric: val_mrr
  val_rank_edges: 50
  grad_clip: 1.0
  amp: true
  progress_every_batches: 25
  progress_every_seconds: 120
eval:
  filtered_rank_edges: 200
ablation:
  enabled: false
