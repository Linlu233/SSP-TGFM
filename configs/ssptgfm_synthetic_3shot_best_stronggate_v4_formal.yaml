device: cuda
require_cuda: true
output_dir: results/ssptgfm_synthetic_3shot_best_stronggate_v4_formal
seeds:
- 1
- 2
- 3
- 4
- 5
few_shot_ratios:
- 1.0
baselines:
- lm_mlp
- structure_mlp
data:
  name: synthetic
  seed: 1
  num_nodes: 256
  num_relations: 4
  num_edges: 1600
  num_topics: 8
scenario:
  name: standard
split:
  val_ratio: 0.15
  test_ratio: 0.15
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 192
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 24
  adapter_rank: 24
  temporal_layers: 2
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
train:
  epochs: 30
  batch_size: 256
  lr: 0.0007
  weight_decay: 0.0001
  num_neg_train: 4
  num_neg_eval: 25
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.0005
  lambda_kl: 5.0e-06
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 16
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 6
  grad_clip: 1.0
  early_stop_metric: composite
  early_stop_weights:
    val_ap: 0.4
    val_auc: 0.35
    val_hits@10: 0.8
    val_mrr: 2.4
    val_ndcg: 0.2
eval:
  filtered_rank_edges: 100
ablation:
  enabled: false
k_shot:
  k: 3
  by: relation
strict_full_formula: true
