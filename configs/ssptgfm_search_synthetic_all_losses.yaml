device: cuda
require_cuda: true
output_dir: results/ssptgfm_search_synthetic_all_losses
seeds: [1, 2, 3]
few_shot_ratios: [1.0]
baselines: []

data:
  name: synthetic
  seed: 1
  num_nodes: 256
  num_relations: 4
  num_edges: 1600
  num_topics: 8

scenario:
  name: standard

split:
  val_ratio: 0.15
  test_ratio: 0.15

text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 128
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 16
  adapter_rank: 16
  temporal_layers: 2
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true

train:
  epochs: 12
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 25
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.01
  lambda_kl: 0.0001
  lambda_meta: 0.0
  meta_lr: 0.01
  meta_support_size: 16
  lambda_ood: 0.0
  align_temperature: 0.2
  patience: 5
  grad_clip: 1.0

eval:
  filtered_rank_edges: 100

ablation:
  enabled: false

search:
  metric: val_auc
  candidates:
    - name: all_losses_meta_001_ood_001
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.01, lambda_ood: 0.001}
    - name: all_losses_meta_001_ood_01
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.01, lambda_ood: 0.01}
    - name: all_losses_meta_005_ood_001
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.005, lambda_ood: 0.001}
