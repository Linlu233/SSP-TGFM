device: cuda
require_cuda: true
output_dir: results/ssptgfm_search_yago15k_temporal_all_losses
seeds: [1, 2]
few_shot_ratios: [1.0]
baselines: []
strict_full_formula: true

data:
  name: yago15k-temporal
  format: csv
  path: data/raw/yago15k_temporal

split:
  mode: time
  val_ratio: 0.15
  test_ratio: 0.15

text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 96
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 12
  adapter_rank: 12
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true

train:
  epochs: 12
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 10
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.05
  lambda_kl: 0.0005
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 8
  meta_query_size: 8
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 4
  grad_clip: 1.0

eval:
  filtered_rank_edges: 100

ablation:
  enabled: false

search:
  metric: val_auc
  strict_full_formula: true
  candidates:
    - name: h96_lr1e3_meta005_ood001
      model: {hidden_dim: 96, relation_rank: 12, adapter_rank: 12, temporal_layers: 1}
      train: {lr: 0.001, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.005, lambda_ood: 0.001}
    - name: h96_lr7e4_meta01_ood001
      model: {hidden_dim: 96, relation_rank: 12, adapter_rank: 12, temporal_layers: 1}
      train: {lr: 0.0007, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.01, lambda_ood: 0.001}
    - name: h128_lr7e4_meta01_ood001
      model: {hidden_dim: 128, relation_rank: 16, adapter_rank: 16, temporal_layers: 1}
      train: {lr: 0.0007, lambda_align: 0.05, lambda_kl: 0.0005, lambda_meta: 0.01, lambda_ood: 0.001}
