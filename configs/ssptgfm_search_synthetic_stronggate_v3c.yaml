device: cuda
require_cuda: true
strict_full_formula: true
output_dir: results/ssptgfm_search_synthetic_stronggate_v3c
seeds: [1, 2, 3]
few_shot_ratios: [1.0]
baselines: []

data:
  name: synthetic
  seed: 1
  num_nodes: 256
  num_relations: 4
  num_edges: 1600
  num_topics: 8

scenario:
  name: standard

split:
  val_ratio: 0.15
  test_ratio: 0.15

text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 192
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 24
  adapter_rank: 24
  temporal_layers: 2
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true

train:
  epochs: 18
  batch_size: 256
  lr: 0.0007
  weight_decay: 0.0001
  num_neg_train: 2
  num_neg_eval: 25
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.005
  lambda_kl: 5.0e-05
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 16
  meta_query_size: 16
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 5
  early_stop_metric: all_minima_margin
  early_stop_minima:
    val_auc: 0.865
    val_ap: 0.215
    val_mrr: 0.13
    "val_hits@10": 0.28
  val_rank_edges: 100
  grad_clip: 1.0
  progress_every_seconds: 120

eval:
  filtered_rank_edges: 100

ablation:
  enabled: false

search:
  metric: all_minima_margin
  metrics: [val_auc, val_ap, val_mrr, "val_hits@10", "val_hits@50", "val_hits@100", val_ndcg]
  metric_minima:
    val_auc: 0.865
    val_ap: 0.215
    val_mrr: 0.13
    "val_hits@10": 0.28
  strict_full_formula: true
  candidates:
    - name: mrr_midloss_neg2
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 2, lambda_align: 0.005, lambda_kl: 5.0e-05, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: val_mrr}
    - name: mrr_midloss_neg3
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 3, lambda_align: 0.005, lambda_kl: 5.0e-05, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: val_mrr}
    - name: mrr_lowmid_neg2
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 2, lambda_align: 5.0e-04, lambda_kl: 5.0e-06, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: val_mrr}
    - name: mrr_lowmid_neg4
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 4, lambda_align: 5.0e-04, lambda_kl: 5.0e-06, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: val_mrr}
    - name: gate_lowmid_neg2
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 2, lambda_align: 5.0e-04, lambda_kl: 5.0e-06, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: all_minima_margin}
    - name: gate_lowmid_neg4
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train: {lr: 0.0007, num_neg_train: 4, lambda_align: 5.0e-04, lambda_kl: 5.0e-06, lambda_meta: 0.005, lambda_ood: 0.001, early_stop_metric: all_minima_margin}
    - name: composite_midalign_neg4
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train:
        lr: 0.0005
        num_neg_train: 4
        lambda_align: 0.001
        lambda_kl: 1.0e-05
        lambda_meta: 0.005
        lambda_ood: 0.001
        early_stop_metric: composite
        early_stop_weights: {val_auc: 0.35, val_ap: 0.35, val_mrr: 1.1, "val_hits@10": 0.35, val_ndcg: 0.20}
    - name: composite_rankblend_neg6
      model: {hidden_dim: 192, relation_rank: 24, adapter_rank: 24, temporal_layers: 2}
      train:
        lr: 0.0005
        num_neg_train: 6
        lambda_align: 1.0e-04
        lambda_kl: 1.0e-06
        lambda_meta: 0.003
        lambda_ood: 0.003
        early_stop_metric: composite
        early_stop_weights: {val_auc: 0.30, val_ap: 0.35, val_mrr: 1.3, "val_hits@10": 0.45, val_ndcg: 0.20}
