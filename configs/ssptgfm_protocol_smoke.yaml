device: cuda
output_dir: results/ssptgfm_protocol_smoke
seeds: [1]
few_shot_ratios: [1.0]
baselines: [lm_mlp, structure_mlp]

data:
  name: synthetic
  seed: 2
  num_nodes: 64
  num_relations: 4
  num_edges: 420
  num_topics: 8

scenario:
  name: hallucination_stress

k_shot:
  k: 3
  by: relation

split:
  val_ratio: 0.15
  test_ratio: 0.15

text:
  backend: hashing
  dim: 128
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 48
  time_dim: 16
  prompt_tokens: 2
  prompt_heads: 2
  relation_rank: 8
  adapter_rank: 8
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true

train:
  epochs: 1
  batch_size: 64
  lr: 0.002
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 2
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.01
  lambda_kl: 0.0001
  lambda_meta: 0.0
  meta_lr: 0.01
  meta_support_size: 8
  lambda_ood: 0.0
  align_temperature: 0.2
  patience: 1
  grad_clip: 1.0

eval:
  filtered_rank_edges: 5

ablation:
  enabled: false
