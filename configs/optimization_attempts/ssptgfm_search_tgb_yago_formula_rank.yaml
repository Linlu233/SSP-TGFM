device: cuda
require_cuda: true
output_dir: results/optimization_attempts/search_tgb_yago_formula_rank
seeds: [1, 2]
few_shot_ratios: [1.0]
baselines: []
strict_full_formula: true

data:
  name: tkgl-yago
  format: tgb
  root: /root/autodl-tmp/data/data/raw/tgb
  download: false

split:
  mode: labels

text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache

model:
  hidden_dim: 128
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 16
  adapter_rank: 16
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true

train:
  epochs: 12
  batch_size: 4096
  lr: 0.0007
  weight_decay: 0.0001
  num_neg_train: 5
  num_neg_eval: 10
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.01
  lambda_kl: 0.0001
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 4
  meta_query_size: 4
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 4
  early_stop_metric: val_composite
  early_stop_weights: {val_mrr: 0.5, val_hits@10: 0.25, val_auc: 0.15, val_ap: 0.1}
  val_rank_edges: 50
  grad_clip: 1.0

eval:
  filtered_rank_edges: 100

ablation:
  enabled: false

search:
  metric: composite
  metrics: [val_auc, val_ap, val_mrr, val_hits@10]
  metric_weights: {val_mrr: 0.5, val_hits@10: 0.25, val_auc: 0.15, val_ap: 0.1}
  strict_full_formula: true
  candidates:
    - name: formula_rank_lr7e4_neg5_align01
      model: {hidden_dim: 128, relation_rank: 16, adapter_rank: 16, temporal_layers: 1}
      train: {lr: 0.0007, num_neg_train: 5, lambda_align: 0.01, lambda_kl: 0.0001, lambda_meta: 0.005, lambda_ood: 0.001}
    - name: formula_rank_lr5e4_neg5_align005
      model: {hidden_dim: 128, relation_rank: 16, adapter_rank: 16, temporal_layers: 1}
      train: {lr: 0.0005, num_neg_train: 5, lambda_align: 0.005, lambda_kl: 0.0001, lambda_meta: 0.005, lambda_ood: 0.001}
    - name: formula_rank_lr7e4_neg10_align005
      model: {hidden_dim: 128, relation_rank: 16, adapter_rank: 16, temporal_layers: 1}
      train: {lr: 0.0007, num_neg_train: 10, lambda_align: 0.005, lambda_kl: 0.0001, lambda_meta: 0.005, lambda_ood: 0.001}
