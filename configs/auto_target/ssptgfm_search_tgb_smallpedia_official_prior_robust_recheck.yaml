device: cuda
require_cuda: true
output_dir: results/official_tgb_smallpedia_prior_robust_recheck/search
seeds:
- 1
few_shot_ratios:
- 1.0
baselines: []
strict_full_formula: true
data:
  name: tkgl-smallpedia
  format: tgb
  root: /root/autodl-tmp/data/data/raw/tgb
  download: false
split:
  mode: labels
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 128
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 16
  adapter_rank: 16
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
  use_history_prior: true
train:
  epochs: 6
  batch_size: 512
  lr: 0.0007
  weight_decay: 0.0001
  num_neg_train: 4
  num_neg_eval: 10
  negative_mode_train: relation_hard
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.01
  lambda_kl: 0.0001
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 4
  meta_query_size: 4
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 3
  early_stop_metric: val_tgb_mrr
  early_stop_weights:
    val_mrr: 0.5
    val_hits@10: 0.2
    val_ap: 0.15
    val_ndcg: 0.1
    val_auc: 0.05
  val_rank_edges: 0
  grad_clip: 1.0
  progress_every_batches: 100
  progress_every_seconds: 120.0
  val_binary_edges: 128
  val_eval_sample: temporal_uniform
  lambda_rank: 0.01
  rank_loss_type: bpr
  rank_margin: 0.0
  lambda_candidate_rank: 0.02
  candidate_rank_size: 64
  candidate_rank_sides: tail
  candidate_rank_queries: 32
eval:
  tgb_official: true
  tgb_val_edges: 128
  filtered_rank_edges: 0
  tgb_eval_edges: 256
ablation:
  enabled: false
search:
  metric: val_tgb_mrr
  metrics:
  - val_tgb_mrr
  - val_tgb_hits@10
  - val_auc
  - val_ap
  - val_ndcg
  seeds:
  - 1
  train_edge_limit: 12000
  train_edge_sample: temporal_uniform
  candidates:
  - name: prior_old_struct_residual_hist_scale1_cr005
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.0
      freeze_history_prior: true
      use_struct_feature_residual: true
      struct_feature_init_scale: 0.2
    train:
      lambda_candidate_rank: 0.05
      candidate_rank_queries: 64
  - name: prior_old_hist_linear_frozen_scale2_cr002
    model:
      history_prior_mode: linear
      history_prior_init_scale: 2.0
      freeze_history_prior: true
      history_prior_layer_norm: false
    train: {}
  - name: prior_old_hist_linear_frozen_scale1_cr002
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.0
      freeze_history_prior: true
      history_prior_layer_norm: false
    train: {}
  - name: prior_old_hist_gate_scale1_relent_cr005
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.0
      freeze_history_prior: true
      use_history_prior_gate: true
      history_prior_gate_init_bias: 1.0
      use_relation_entity_prior: true
      relation_entity_prior_rank: 16
      relation_entity_prior_init_scale: 0.1
    train:
      lambda_candidate_rank: 0.05
      candidate_rank_queries: 64
  - name: scale_best_s15_gate_b1_cr005
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.5
      freeze_history_prior: true
      use_struct_feature_residual: true
      struct_feature_init_scale: 0.2
      use_history_prior_gate: true
      history_prior_gate_init_bias: 1.0
    train:
      lambda_candidate_rank: 0.05
      candidate_rank_queries: 64
  - name: scale_s1_gate_b1_cr005
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.0
      freeze_history_prior: true
      use_struct_feature_residual: true
      struct_feature_init_scale: 0.2
      use_history_prior_gate: true
      history_prior_gate_init_bias: 1.0
    train:
      lambda_candidate_rank: 0.05
      candidate_rank_queries: 64
  - name: scale_s15_sf02_cr002
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.5
      freeze_history_prior: true
      use_struct_feature_residual: true
      struct_feature_init_scale: 0.2
    train: {}
  - name: scale_s15_relent_cr005
    model:
      history_prior_mode: linear
      history_prior_init_scale: 1.5
      freeze_history_prior: true
      use_struct_feature_residual: true
      struct_feature_init_scale: 0.2
      use_relation_entity_prior: true
      relation_entity_prior_rank: 16
      relation_entity_prior_init_scale: 0.1
    train:
      lambda_candidate_rank: 0.05
      candidate_rank_queries: 64
