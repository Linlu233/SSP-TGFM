device: cuda
require_cuda: true
output_dir: results/unified_s15_fe647b370ebb_val/search_icews14
seeds:
- 1
few_shot_ratios:
- 1.0
baselines: []
strict_full_formula: true
data:
  name: icews14
  format: csv
  path: data/raw/icews14
split:
  mode: time
  val_ratio: 0.15
  test_ratio: 0.15
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 128
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 16
  adapter_rank: 16
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
  use_history_prior: true
  history_prior_mode: linear
  history_prior_init_scale: 1.5
  freeze_history_prior: true
  use_struct_feature_residual: true
  struct_feature_init_scale: 0.2
train:
  epochs: 8
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 10
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.05
  lambda_kl: 0.0005
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 8
  meta_query_size: 8
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 3
  grad_clip: 1.0
  early_stop_metric: val_composite
  early_stop_weights:
    val_mrr: 0.5
    val_hits@10: 0.2
    val_ap: 0.15
    val_ndcg: 0.1
    val_auc: 0.05
  val_rank_edges: 100
  val_binary_edges: 512
  val_eval_sample: temporal_uniform
  eval_batch_size_candidates: 512
eval:
  filtered_rank_edges: 100
ablation:
  enabled: false
search:
  metric: composite
  metrics:
  - val_auc
  - val_ap
  - val_mrr
  - val_hits@10
  - val_ndcg
  metric_weights:
    val_mrr: 0.5
    val_hits@10: 0.2
    val_ap: 0.15
    val_ndcg: 0.1
    val_auc: 0.05
  strict_full_formula: true
  seeds:
  - 1
