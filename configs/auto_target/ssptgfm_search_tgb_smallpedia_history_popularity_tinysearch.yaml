device: cuda
require_cuda: true
output_dir: results/auto_target_tiny_tgb_smallpedia/search_tgb_smallpedia_history_popularity_tinysearch
seeds:
- 1
- 2
few_shot_ratios:
- 1.0
baselines: []
strict_full_formula: true
data:
  name: tkgl-smallpedia
  format: tgb
  root: /root/autodl-tmp/data/data/raw/tgb
  download: true
split:
  mode: labels
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 96
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 12
  adapter_rank: 12
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
  use_history_prior: true
train:
  epochs: 1
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 5
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.05
  lambda_kl: 0.0005
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 4
  meta_query_size: 4
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 1
  grad_clip: 1.0
  early_stop_metric: val_composite
  early_stop_weights: &id001
    val_ap: 0.45
    val_auc: 0.25
    val_ndcg: 0.2
    val_mrr: 0.05
    val_hits@10: 0.05
  val_rank_edges: 0
  progress_every_batches: 100
  progress_every_seconds: 120.0
  val_binary_edges: 512
eval:
  filtered_rank_edges: 250
ablation:
  enabled: false
search:
  metric: composite
  metrics:
  - val_auc
  - val_ap
  - val_mrr
  - val_hits@10
  - val_ndcg
  metric_weights: *id001
  strict_full_formula: true
