device: cuda
require_cuda: true
output_dir: results/auto_target_optimization_dryrun/search_icews05_15_balanced_rank_v1
seeds:
- 1
- 2
few_shot_ratios:
- 1.0
baselines: []
strict_full_formula: true
data:
  name: icews05-15
  format: csv
  path: data/raw/icews05-15
split:
  mode: time
  val_ratio: 0.15
  test_ratio: 0.15
text:
  backend: hashing
  dim: 384
  cache_dir: data/processed/text_cache
model:
  hidden_dim: 96
  time_dim: 32
  prompt_tokens: 4
  prompt_heads: 4
  relation_rank: 12
  adapter_rank: 12
  temporal_layers: 1
  temporal_encoder: mlp
  time_encoder: fourier
  use_struct: true
  use_sem: true
  use_cross: true
  use_gate: true
  use_variational: true
train:
  epochs: 10
  batch_size: 4096
  lr: 0.001
  weight_decay: 0.0001
  num_neg_train: 1
  num_neg_eval: 10
  negative_mode_train: filtered
  negative_mode_eval: filtered
  filter_scope: exact
  lambda_align: 0.05
  lambda_kl: 0.0005
  lambda_meta: 0.005
  meta_lr: 0.01
  meta_support_size: 4
  meta_query_size: 4
  lambda_ood: 0.001
  align_temperature: 0.2
  patience: 4
  grad_clip: 1.0
  early_stop_metric: val_composite
  early_stop_weights: &id001
    val_mrr: 0.4
    val_hits@10: 0.25
    val_ap: 0.2
    val_auc: 0.1
    val_ndcg: 0.05
  val_rank_edges: 75
  progress_every_batches: 100
  progress_every_seconds: 120.0
eval:
  filtered_rank_edges: 150
ablation:
  enabled: false
search:
  metric: composite
  metrics:
  - val_auc
  - val_ap
  - val_mrr
  - val_hits@10
  - val_ndcg
  metric_weights: *id001
